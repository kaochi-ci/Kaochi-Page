    <script>
      function updateJam() {
        const waktu = new Date();
        let jam = waktu.getHours();
        let menit = waktu.getMinutes();

        // Tambahin angka 0 di depan kalau angkanya di bawah 10 (biar estetik 09:05, bukan 9:5)
        jam = jam < 10 ? "0" + jam : jam;
        menit = menit < 10 ? "0" + menit : menit;

        // Masukin waktunya ke dalam HTML
        document.getElementById("jam-otomatis").textContent = jam + ":" + menit;
      }

      // Jalankan jamnya setiap 1 detik
      setInterval(updateJam, 1000);
      updateJam(); // Biar langsung muncul pas web dibuka
